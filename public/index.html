<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ItemCheckr Dashboard</title>
    <style>
    :root {
    --primary: #3b82f6;
    --danger: #912626;
    --success: #22c55e;
    --bg: #232423;      /* Deep dark grey/blue */
    --card: #383f44;    /* Slightly lighter grey for boxes */
    --text: #f8fafc;    /* White text */
    --border: #334155;  /* Grey border */
    --header: #334155;  /* Table header grey */
    --btn-add: #157739d2;  /* Green for add button */
}

body { 
    font-family: 'Inter', system-ui, sans-serif; 
    margin: 0; 
    padding: 2rem; 
    background-color: var(--bg); 
    color: var(--text);
}

h1, h3 { color: var(--text); margin-bottom: 2rem; }

.container { max-width: 1200px; margin: 0 auto; }

.card {
    background: var(--card);
    padding: 1.5rem;
    border-radius: 0.75rem;
    box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.3);
    margin-bottom: 2rem;
    border: 1px solid var(--border);
}

.form-group { margin-bottom: 1rem; }

input, select {
    width: 100%;
    padding: 0.625rem;
    background-color: var(--bg);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 0.375rem;
    margin-top: 0.25rem;
    box-sizing: border-box;
}

input:focus, select:focus {
    outline: 2px solid var(--primary);
    border-color: transparent;
}

button {
    cursor: pointer;
    padding: 0.625rem 1rem;
    border-radius: 0.375rem;
    border: none;
    font-weight: 600;
    transition: filter 0.2s;
}

button:hover { filter: brightness(1.2); }

.btn-primary { background: var(--primary); color: white; }
.btn-danger { background: var(--danger); color: white; }
.btn-secondary { background: #64748b; color: white; }
.btn-add { 
    background-color: var(--btn-add); 
    color: white; 
}

table { 
    width: 100%; 
    border-collapse: collapse; 
    background: var(--card);
    border-radius: 0.75rem;
    overflow: hidden;
    box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.3);
    border: 1px solid var(--border);
}

th { 
    background: var(--header); 
    color: var(--text);
    font-weight: 600; 
    text-align: left; 
}

th, td { padding: 1rem; border-bottom: 1px solid var(--border); }

.status-badge {
    padding: 0.25rem 0.625rem;
    border-radius: 9999px;
    font-size: 0.75rem;
    font-weight: 700;
    text-transform: uppercase;
}

.status-IN_STOCK { background: #064e3b; color: #6ee7b7; }
.status-OUT_OF_STOCK { background: #7f1d1d; color: #fca5a5; }
.status-ERROR { background: #78350f; color: #fcd34d; }

.modal { display: none; position: fixed; z-index: 10; inset: 0; background: rgba(0,0,0,0.7); backdrop-filter: blur(4px); }
.modal-content { background: var(--card); color: var(--text); margin: 15% auto; padding: 2rem; border-radius: 0.75rem; width: 400px; border: 1px solid var(--border); }
    </style>
</head>
<body>
    <h1>ItemCheckr Dashboard</h1>
    <button id="forceCheckBtn" class="btn-secondary" style="margin-bottom: 1.5rem;">Force Stock Check Now</button>
        
    <div style="border: 1px solid #ccc; padding: 15px; width: 300px;">
        <h3>Add New Product</h3>
        <form id="addProductForm">
            <div class="form-group">
                <label for="productName">Product Name:</label><br>
                <input type="text" id="productName" required>
            </div>
            <div class="form-group">
                <label for="productUrl">Product URL:</label><br>
                <input type="url" id="productUrl" required>
            </div>
            <div class="form-group">
                <label for="productMerchant">Merchant:</label><br>
                <select id="productMerchant" required>
                    <option value="" disabled selected>Select a merchant</option>
                    <option value="Mondou">Mondou</option>
                    <option value="Amazon">Amazon</option>
                    <option value="Aubut">Aubut</option>
                    <option value="Other">Other</option>
                </select>
            </div>
            </div>
            <button type="submit" class="btn-add">Add Item</button>
        </form>
    </div>

    <table id="productsTable">
        <thead>
            <tr>
                <th>ID</th>
                <th>Name</th>
                <th>Merchant</th>
                <th>Last Price</th>
                <th>Last Checked</th>
                <th>Status</th>
                <th>History</th>
                <th>Delete</th>
            </tr>
        </thead>
        <tbody>
            </tbody>
    </table>
    <div id="deleteModal" class="modal">
    <div class="modal-content">
        <p>Confirm deletion of this product?</p>
        <button id="confirmDelete" class="btn-danger">Delete</button>
        <button id="cancelDelete" class="btn-secondary">Cancel</button>
    </div>
    </div>
    <script src="main.js"></script>
</body>
</html>
